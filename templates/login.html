{% extends "layout.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="flex justify-center items-start">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm">
        <h2 class="text-3xl font-bold text-center mb-6 text-green-700">Iniciar Sesion</h2>

        {% if error_message %}
            <div class="p-4 mb-3 rounded-lg shadow-sm font-bold text-center bg-red-100 border-l-4 border-red-500 text-red-700">
                <p>{{ error_message }}</p>
            </div>
        {% elif success_message %}
            <div class="p-4 mb-3 rounded-lg shadow-sm font-bold text-center bg-green-100 border-l-4 border-green-500 text-green-700">
                <p>{{ success_message }}</p>
            </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Usuario:</label>
                <input type="text" id="username" name="username" required
                       class="shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Contraseña:</label>
                <input type="password" id="password" name="password" required
                       class="shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
            <div class="flex items-center justify-between">
                <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:shadow-outline transition-colors w-full">
                    Entrar
                </button>
            </div>
            <p class="text-center text-gray-600 text-sm mt-4">
                ¿No tenes una cuenta? <a href="{{ url_for('register') }}" class="text-green-600 hover:text-green-800 font-bold">Registrate aqui</a>.
            </p>
        </form>
    </div>
</div>
{% endblock %}
